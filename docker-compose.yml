services:
  postgres:
    image: postgres:16-alpine
    container_name: aetherix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aetherix
      POSTGRES_PASSWORD: aetherix
      POSTGRES_DB: aetherix
    ports:
      - "55432:5432"
    volumes:
      - aetherix-pgdata:/var/lib/postgresql/data
      - ./apps/api/scripts/init-test-db.sql:/docker-entrypoint-initdb.d/10-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetherix -d aetherix"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: aetherix-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - plugins.security.disabled=true   # Dev/PoC only. Enable + configure TLS + auth for staging/prod.
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - aetherix-osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  aetherix-pgdata:
  aetherix-osdata:
