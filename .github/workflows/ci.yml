name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api:
    name: API + Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aetherix
          POSTGRES_PASSWORD: aetherix
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aetherix -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AETHERIX_DATABASE_URL: postgresql://aetherix:aetherix@127.0.0.1:5432/aetherix
      AETHERIX_TEST_DATABASE_URL: postgresql://aetherix:aetherix@127.0.0.1:5432/aetherix_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Create databases
        env:
          PGPASSWORD: aetherix
        run: |
          psql -h 127.0.0.1 -U aetherix -d postgres -c "create database aetherix;" || true
          psql -h 127.0.0.1 -U aetherix -d postgres -c "create database aetherix_test;" || true

      - name: Run Alembic migrations
        working-directory: apps/api
        run: alembic -c alembic.ini upgrade head

      - name: Run API tests
        working-directory: apps/api
        run: pytest -q

  console:
    name: Console Build + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Run console unit tests
        run: npm --workspace apps/console run test

      - name: Build console
        run: npm --workspace apps/console run build

  console-e2e:
    name: Console Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run policy critical flow e2e
        run: npm --workspace apps/console run test:e2e

  agent:
    name: Agent Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run agent tests
        run: cargo test --manifest-path agent/Cargo.toml --locked
